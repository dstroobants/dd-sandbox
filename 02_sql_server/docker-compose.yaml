version: '3'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    hostname: sqlserver
    environment:
      PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/opt/mssql-tools18/bin"
      MSSQL_SA_PASSWORD: "SA_Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P SA_Passw0rd -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
  sqlserver.configurator:
    image: mcr.microsoft.com/mssql/server:2022-latest
    volumes:
      - ./init-db.sql:/init-db.sql
    depends_on:
      sqlserver:
        condition: service_healthy
    command: >
      bash -c '/opt/mssql-tools18/bin/sqlcmd -C -S sqlserver -U sa -P "SA_Passw0rd" -d master -i init-db.sql && echo "Done! DB Initialized"'
  datadog-agent:
    container_name: datadog-agent
    build:
      dockerfile: Dockerfile.datadog-agent
    env_file:
      - ~/sandbox.docker.env
    environment:
      - DD_HOSTNAME=datadog-agent
      - DD_APM_ENABLED=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_AC_EXCLUDE=name:datadog-agent-ft
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - "$PWD/conf.d/sqlserver.d/conf.yaml:/etc/datadog-agent/conf.d/sqlserver.d/conf.yaml"
    ports:
      - "8126:8126"
    depends_on:
      - sqlserver
  application-script:
    container_name: app-script
    build:
      dockerfile: Dockerfile
    depends_on:
      - sqlserver
    environment:
      - DD_ENV=test
      - DD_AGENT_HOST=datadog-agent
    ports:
      - '8080:8080'